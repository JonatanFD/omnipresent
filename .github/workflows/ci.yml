name: CI

# The quality gate from the engineering rules, on every push and PR: the code
# is formatted, clippy is clean with warnings denied, and the tests pass — on
# each platform omnipresent targets (Linux, macOS, Windows).
on:
  push:
    branches: [develop, master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, with rustfmt and clippy)
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
