name: Release

# Cut a release by pushing a version tag (e.g. `v0.1.0`). This builds the
# `omni` binary natively on each platform, packages it, and attaches the
# archives — plus the install scripts — to a GitHub Release. End users never
# build from source (no Rust toolchain, no C compiler): they download a
# prebuilt binary with the one-liners in the README.
#
# The native Windows GUI (WinUI 3, `clients/omni-windows`) is also built
# self-contained and attached as `omni-gui-x86_64-pc-windows-msvc.zip`, so it
# runs on any Windows x64 box without installing .NET.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS targets build on the Apple-silicon runner: arm64 native,
          # x86_64 cross-compiled (the Apple toolchain targets both). This avoids
          # depending on the older Intel `macos-13` runner.
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, ${{ matrix.target }})
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --bin omni --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="omni-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" omni
          if command -v sha256sum >/dev/null; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "omni-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/omni.exe" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File "$archive.sha256" -Encoding ascii

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            omni-${{ matrix.target }}.tar.gz
            omni-${{ matrix.target }}.tar.gz.sha256
            omni-${{ matrix.target }}.zip
            omni-${{ matrix.target }}.zip.sha256
          fail_on_unmatched_files: false

  scripts:
    name: attach install scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Attach install scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install.ps1

  windows-gui:
    name: build Windows GUI (WinUI 3)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clients/omni-windows
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Self-contained: the .zip carries the .NET runtime and the Windows App
      # SDK, so end users download and run it — no .NET install — the same deal
      # as the CLI. `-o publish` keeps the output path independent of the
      # target-framework moniker.
      - name: Publish (self-contained)
        run: >
          dotnet publish src/Omni.App/Omni.App.csproj
          -c Release -r win-x64 --self-contained -p:Platform=x64 -o publish

      - name: Package
        shell: pwsh
        run: |
          $archive = "omni-gui-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path "publish/*" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File "$archive.sha256" -Encoding ascii

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clients/omni-windows/omni-gui-x86_64-pc-windows-msvc.zip
            clients/omni-windows/omni-gui-x86_64-pc-windows-msvc.zip.sha256
